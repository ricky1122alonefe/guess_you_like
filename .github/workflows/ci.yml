name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall -q .
      - name: CLI smoke
        run: guess-you-like version
      - name: Smoke tests
        run: pytest -q
